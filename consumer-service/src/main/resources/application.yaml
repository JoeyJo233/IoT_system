spring:
  application:
    name: iot-consumer-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${app.kafka.consumer-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.consumer.model"
        spring.json.value.default.type: "com.example.consumer.model.SensorData"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  # Spring Boot 4 moved Mongo properties out of spring.data.mongodb.* to
  # spring.mongodb.*. Redis is still under spring.data.redis.*.
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/iot}
    database: ${MONGODB_DATABASE:iot}

  data:
    mongodb:
      # Auto-create indexes declared via @CompoundIndex / @Indexed.
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

app:
  kafka:
    topic: ${KAFKA_TOPIC:iot-sensor-data}
    consumer-group: ${KAFKA_CONSUMER_GROUP:iot-consumer-group}

server:
  port: 8082

logging:
  level:
    root: INFO
    com.example.consumer: INFO
